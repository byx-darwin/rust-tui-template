name: build

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── PR checks: fast feedback ─────────────────────────────────
  build-rust:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - uses: Swatinem/rust-cache@v2

      - name: Check code format
        if: runner.os == 'Linux'
        run: cargo +nightly fmt -- --check

      - name: Check the package for errors
        run: cargo check --workspace --all-targets --all-features

      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check dependency licenses and advisories
        if: runner.os == 'Linux'
        run: cargo deny check

      - name: Check for known security vulnerabilities
        if: runner.os == 'Linux'
        run: cargo audit

      - name: Execute rust tests
        run: cargo nextest run --all-features

  # ── MSRV check ─────────────────────────────────────────────
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse MSRV from Cargo.toml
        id: msrv
        run: |
          MSRV=$(grep 'rust-version' Cargo.toml | head -1 | sed 's/.*= *"//' | sed 's/"//')
          echo "msrv=$MSRV" >> "$GITHUB_OUTPUT"

      - name: Install MSRV toolchain
        run: rustup toolchain install ${{ steps.msrv.outputs.msrv }}

      - name: Check with MSRV toolchain
        run: cargo +${{ steps.msrv.outputs.msrv }} check --workspace --all-features

  # ── Binary builds for release ──────────────────────────────
  build-binaries:
    needs: build-rust
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            setup: rustup target add x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install cross-compilation toolchain
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Setup target
        if: matrix.setup
        run: ${{ matrix.setup }}

      - name: Install Rust target
        if: "!matrix.cross && !matrix.setup"
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          BIN_NAME="{{ project-name }}-tui${{ matrix.ext }}"
          ARCHIVE_NAME="{{ project-name }}-tui-${GITHUB_REF_NAME#v}-${{ matrix.target }}.${{ matrix.archive }}"

          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar czf "$ARCHIVE_NAME" "$BIN_NAME"
          else
            7z a "$ARCHIVE_NAME" "$BIN_NAME"
          fi

          SHA256=$(sha256sum "$ARCHIVE_NAME" | cut -d' ' -f1)
          echo "$SHA256  $ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          echo "archive=$ARCHIVE_NAME" >> "$GITHUB_ENV"
          echo "sha256=$SHA256" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/{{ project-name }}-*.tar.gz*
          if-no-files-found: error

  # ── GitHub Release ─────────────────────────────────────────
  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-*"
          merge-multiple: true

      - name: Generate checksums file
        run: |
          shasum -a 256 artifacts/*.tar.gz artifacts/*.zip > artifacts/checksums.sha256

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.git-cliff.outputs.content }}
          generate_release_notes: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/*.tar.gz
